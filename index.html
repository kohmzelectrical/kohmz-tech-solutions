        /* Signature KOHMZ Corporate Theme */
        :root {
            --corp-blue: #0056b3;   /* Match Logo Blue */

            --bg-light: #fbfbfc;
            --text-dark: #222;
            --text-muted: #555;
            --border-line: #eaeaea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        /* Strict Font Sizing as requested */
        body { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text-dark); background: var(--bg-light); line-height: 1.8; }

        p, a, li, label, input, select { font-size: 12px; }
        .small-text, footer, footer p, footer a { font-size: 10px; }

        /* Navigation with Logo */
        nav { background: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-line); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .logo-container { display: flex; align-items: center; text-decoration: none; color: var(--corp-blue); }
        .logo-img { height: 25px; width: auto; margin-right: 10px; }

        .logo-text span { color: var(--corp-gold); }
        .nav-links a { color: var(--text-dark); text-decoration: none; margin-left: 20px; font-weight: 600; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .nav-links a:hover { color: var(--corp-gold); }
        .btn-book { background: var(--corp-blue); color: white !important; padding: 8px 16px; border-radius: 3px; font-size: 11px; }
        .btn-book:hover { background: #003d7e; }
