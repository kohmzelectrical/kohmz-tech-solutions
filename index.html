<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Providing the best electrical services for your needs.">
    <link rel="stylesheet" href="styles.css">
    <title>Kohmz Electrical Services</title>
</head>
<body>
    <header>
        <h1>Kohmz Electrical Services</h1>
        <nav>
            <ul>
                <li><a href="#services" accesskey="s">Services</a></li>
                <li><a href="#contact" accesskey="c">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="services">
            <h2>Our Services</h2>
            <p>We offer a variety of electrical services to meet your needs. Whether you need installation, maintenance, or repairs, we've got you covered.</p>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Kohmz Electrical Services</p>
    </footer>
    <script>
        // Lazy loading images and other resources
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('img[data-src]');
            images.forEach(img => {
                img.src = img.dataset.src;
            });
        });
    </script>
</body>
</html>
