    <style>
        /* ==========================================================
           GLOBAL CSS ARCHITECTURE - EXPANDED COMMANDS
           ========================================================== */

        :root {
            --primary-navy: #0d1440;
            --secondary-blue: #1a237e;
            --accent-gold: #ffeb3b;
            --white-pure: #ffffff;
            --gray-light: #f1f5f9;
            --gray-dark: #334155;
            --text-main: #1e293b;
            --success-green: #22c55e;
            --shadow-standard: 0 4px 15px rgba(0,0,0,0.1);
            --transition-smooth: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gray-light);
            color: var(--text-main);
            line-height: 1.8;
        }

        /* --- 1. PREMIUM ADVERTISING TICKER --- */
        .ticker-bar {
            background: var(--primary-navy);
            height: 42px;
            display: flex;
            align-items: center;
            border-bottom: 3px solid var(--accent-gold);
            position: sticky;
            top: 0;
            z-index: 10000;
        }

        .ticker-label {
            background: var(--accent-gold);
            color: var(--primary-navy);
            padding: 0 25px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            box-shadow: 10px 0 20px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .ticker-scroll-window {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-text-move {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: moveText 35s linear infinite;
            font-weight: 700;
            color: var(--white-pure);
            font-size: 14px;
        }

        @keyframes moveText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* --- 2. NAVIGATION BAR --- */
        header {
            background: var(--white-pure);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-standard);
        }

        .brand-container {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 28px;
            color: var(--secondary-blue);
            text-decoration: none;
            line-height: 1;
        }

        .brand-tagline {
            font-size: 11px;
            color: var(--gray-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            font-weight: 600;
        }

        .nav-links-list {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links-list li a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .nav-links-list li a:hover {
            color: var(--secondary-blue);
        }

        /* --- 3. HERO SECTION (RESIDENTIAL & COMMERCIAL FOCUS) --- */
        .hero-banner {
            padding: 140px 8%;
            background: linear-gradient(rgba(13, 20, 64, 0.8), rgba(13, 20, 64, 0.8)), url('https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?q=80&w=2072');
            background-size: cover;
            background-position: center;
            text-align: center;
            color: var(--white-pure);
        }

        .hero-banner h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(32px, 5vw, 55px);
            font-weight: 900;
            margin-bottom: 25px;
        }

        .hero-banner p {
            font-size: 20px;
            max-width: 800px;
            margin: 0 auto 40px;
            opacity: 0.9;
        }

        .cta-button-hero {
            background: var(--accent-gold);
            color: var(--primary-navy);
            padding: 18px 45px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(255, 235, 59, 0.3);
        }

        /* --- 4. SOLAR CALCULATOR SUITE (EXPANDED) --- */
        .tools-section {
            padding: 80px 8%;
            margin-top: -80px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 35px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .calculator-card {
            background: var(--white-pure);
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-top: 8px solid var(--secondary-blue);
        }

        .calculator-card h3 {
            font-family: 'Montserrat';
            margin-bottom: 30px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-field-group {
            margin-bottom: 25px;
        }

            font-weight: 800;
            color: var(--gray-dark);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .input-field-group input {
