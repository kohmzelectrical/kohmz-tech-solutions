<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Parts Shop | KOHMZ Electrical</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Strict Font Scale: 20-14-12-10 */
        body { font-size: 12px; } 
        .moving-ads marquee { font-size: 10px; } 
        .logo h1 { font-size: 20px; } 
        .nav-links li a { font-size: 14px; } 
        .hero h2 { font-size: 20px; color: #ffb703; margin-bottom: 10px; } 
        .hero p { font-size: 12px; max-width: 600px; margin: 0 auto 20px; } 
        .content-section h2 { font-size: 14px; color: #0d1b2a; margin-bottom: 20px; text-transform: uppercase; text-align: center; } 
        .card { text-align: center; border-top: 4px solid #ffb703; padding: 20px; }
        .card h3 { font-size: 14px; margin-bottom: 10px; color: #0d1b2a; } 
        .card p { font-size: 12px; color: #444; line-height: 1.6; margin-bottom: 15px; } 
        .footer-content { font-size: 10px; line-height: 1.6; }
        .footer-content p strong { font-size: 12px; }
        
        .hero {
            background: linear-gradient(rgba(13, 27, 42, 0.9), rgba(13, 27, 42, 0.9)), url('logo.jpg') no-repeat center center;
            background-size: contain; height: 40vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; padding: 0 20px;
        }
        
        /* Buttons para sa Shopee at Lazada */
        .btn-shopee { padding: 8px 15px; font-size: 11px; border-radius: 4px; display: inline-block; text-decoration: none; font-weight: bold; background: #ee4d2d; color: white; margin-bottom: 5px; width: 90%; }
        .btn-lazada { padding: 8px 15px; font-size: 11px; border-radius: 4px; display: inline-block; text-decoration: none; font-weight: bold; background: #0f136d; color: white; width: 90%; }
        .btn-shopee:hover { background: #d73a1e; }
        .btn-lazada:hover { background: #0a0c4a; }
        
        .image-placeholder { height:120px; background:#f4f7f6; margin-bottom:15px; display:flex; align-items:center; justify-content:center; color:#888; border-radius:4px; border: 1px dashed #ccc; }
    </
